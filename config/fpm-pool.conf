[global]
error_log = /dev/stderr
log_level = notice

[www]
listen = /run/php-fpm.sock
listen.backlog = 8192
listen.owner = www
listen.group = www
listen.mode = 0666
user = www
group = www

; 进程管理配置
; ondemand 模式：按需创建进程，适合低流量场景
; 注意：ondemand 模式不支持 max_spare_servers 和 start_servers 参数
pm = ondemand
pm.max_children = 100
pm.process_idle_timeout = 60s
pm.max_requests = 1000

; 状态和监控
pm.status_path = /fpm-status
ping.path = /fpm-ping

; 环境配置
clear_env = no
catch_workers_output = yes
decorate_workers_output = no

; 性能优化
request_terminate_timeout = 300s
request_slowlog_timeout = 10s
slowlog = /var/log/php-fpm-slow.log