name: Build Multi-Arch Docker Image

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 */4 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Docker Config
        uses: actions/checkout@v4

      - name: Download PHP Source
        run: |
          curl -L https://github.com/netcccyun/dnsmgr/archive/refs/heads/main.zip -o source.zip
          unzip -q source.zip
          EXTRACTED_DIR=$(ls -d */ | grep "dnsmgr" | head -n 1)
          cp -rn "$EXTRACTED_DIR"* .
          rm -rf "$EXTRACTED_DIR" source.zip

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, pdo_mysql
          
      - name: Install Dependencies
        # 核心改动：忽略 ssh2 的平台检查，让 vendor 顺利生成
        run: composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-ssh2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dnsmgr:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dnsmgr:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max